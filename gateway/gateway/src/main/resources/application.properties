server.port=8080
spring.application.name=api-gateway

jwt.secret=sanosysalvos1234

# --- RUTA 0: BFF ---
spring.cloud.gateway.routes[0].id=sanosysalvos-bff
# Si hay variable BFF_HOST (Docker) la usa, si no, usa localhost (IntelliJ)
spring.cloud.gateway.routes[0].uri=http://${BFF_HOST:localhost}:8083
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/bff/**
spring.cloud.gateway.routes[0].filters[0]=JwtAuthenticationFilter
spring.cloud.gateway.routes[0].filters[1]=CircuitBreaker=bffCircuitBreaker

# --- RUTA 1: LOGIN ---
spring.cloud.gateway.routes[1].id=login-service
spring.cloud.gateway.routes[1].uri=http://${LOGIN_HOST:localhost}:8089
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/login/**

# --- RUTA 2: AUTH ---
spring.cloud.gateway.routes[2].id=auth-service
spring.cloud.gateway.routes[2].uri=http://${AUTH_HOST:localhost}:8088
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/auth/**

# --- CORS (Ajustado para que tu Frontend no tenga problemas) ---
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:3000
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*

spring.cloud.gateway.discovery.locator.enabled=false